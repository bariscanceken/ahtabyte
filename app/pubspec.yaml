name: ahtabytemobile
description: Günlük rapor PDF görüntüleyici ve not alma uygulaması.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  pdfx: ^2.9.2
  google_fonts: ^6.2.0
  http: ^1.6.0
  path_provider: ^2.1.5
  universal_io: ^2.3.1
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
